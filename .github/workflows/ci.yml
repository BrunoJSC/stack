name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # The env packages validate with zod at import time; skip in CI so build/
  # type-check don't require real secrets (see packages/env/src/*.ts).
  SKIP_ENV_VALIDATION: "true"
  # Make Turborepo non-interactive and color-friendly in CI logs.
  TURBO_UI: "false"
  FORCE_COLOR: "1"

jobs:
  quality:
    name: Lint, types, build & test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting & lint (Ultracite)
        run: bun run check

      - name: Type check
        run: bun run check-types

      - name: Build
        run: bun run build

      - name: Test
        run: bun test
